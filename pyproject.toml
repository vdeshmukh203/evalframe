[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "evalframe"
version = "0.1.0"
description = "Lightweight evaluation framework for LLM outputs"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"

[tool.hatch.build.targets.wheel]
packages = ["src/evalframe"]
